<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Dashboard - 全国天気・ニュース・告知</title>
    
    <!-- サイトアイコン -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2248%22 fill=%22%233b82f6%22/><text x=%2250%%22 y=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2260%22 fill=%22white%22>D</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%233b82f6%22/><text x=%2250%%22 y=%2250%%22 dominant-baseline=%22central%22 text-anchor=%22middle%22 font-size=%2260%22 fill=%22white%22>D</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+JP:wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #f0f4f8;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .weather-grid-item {
            transition: transform 0.2s ease;
        }
        .weather-grid-item:hover {
            transform: translateY(-2px);
        }

        .loading-shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        #news-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .pulse-red {
            animation: pulse-red 2s infinite;
        }
        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        #modal-image-container img {
            width: 100%;
            height: auto;
            max-height: 250px;
            object-fit: cover;
            border-radius: 1rem;
        }
        
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6 pb-20">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex items-center gap-3">
                <svg width="60" height="60" viewBox="0 0 100 100" class="flex-shrink-0">
                    <circle cx="50" cy="50" r="48" fill="#e0f2fe" stroke="#3b82f6" stroke-width="2"/>
                    <rect x="25" y="30" width="50" height="40" rx="3" fill="white" stroke="#3b82f6" stroke-width="2"/>
                    <line x1="30" x2="60" y1="40" y2="40" stroke="#93c5fd" stroke-width="2"/>
                    <line x1="30" x2="65" y1="50" y2="50" stroke="#93c5fd" stroke-width="2"/>
                    <line x1="30" x2="50" y1="60" y2="60" stroke="#93c5fd" stroke-width="2"/>
                    <circle cx="75" cy="35" r="15" fill="#fbbf24" stroke="white" stroke-width="3"/>
                </svg>
                <div class="text-center md:text-left">
                    <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Daily Dashboard</h1>
                    <p id="current-date" class="text-slate-500 font-medium"></p>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <div id="update-status" class="text-xs font-bold px-3 py-1 bg-white border border-slate-200 text-slate-600 rounded-full shadow-sm">
                    <i class="fas fa-check text-green-500 mr-1"></i>最新の状態
                </div>
                <button onclick="refreshAll()" class="p-2 bg-blue-500 text-white rounded-full hover:bg-blue-600 shadow-md transition-all active:scale-95">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </header>

        <!-- Content -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- 告知 -->
            <section class="lg:col-span-12">
                <div class="bg-gradient-to-r from-red-50 to-orange-50 border border-red-100 rounded-3xl p-6 shadow-sm">
                    <div class="flex items-center mb-4">
                        <div class="w-10 h-10 bg-red-500 rounded-xl flex items-center justify-center mr-3 shadow-lg pulse-red">
                            <i class="fas fa-bullhorn text-white"></i>
                        </div>
                        <h2 class="text-xl font-bold text-red-800">運営からの告知</h2>
                    </div>
                    <div id="announcement-box" class="min-h-[60px] flex items-center bg-white/50 rounded-2xl p-4 border border-white">
                        <div id="announcement-content" class="w-full">
                            <p class="text-slate-500 italic text-sm"><i class="fas fa-spinner fa-spin mr-2"></i>告知を確認中...</p>
                        </div>
                    </div>
                </div>
            </section>
            
            <!-- 天気予報 -->
            <section class="lg:col-span-12">
                <div class="glass-card rounded-3xl p-6">
                    <div class="flex items-center mb-6">
                        <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center mr-3">
                            <i class="fas fa-map-marked-alt text-blue-600"></i>
                        </div>
                        <h2 class="text-xl font-bold text-slate-800">全国の天気と気温</h2>
                    </div>
                    
                    <div id="weather-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4 text-center">
                        <div class="loading-shimmer h-44 rounded-2xl"></div>
                        <div class="loading-shimmer h-44 rounded-2xl"></div>
                        <div class="loading-shimmer h-44 rounded-2xl"></div>
                        <div class="loading-shimmer h-44 rounded-2xl"></div>
                        <div class="loading-shimmer h-44 rounded-2xl"></div>
                    </div>
                </div>
            </section>

            <!-- ニュース -->
            <section class="lg:col-span-12">
                <div class="glass-card rounded-3xl p-6">
                    <div class="flex items-center mb-6">
                        <div class="w-10 h-10 bg-orange-100 rounded-xl flex items-center justify-center mr-3">
                            <i class="far fa-newspaper text-orange-600"></i>
                        </div>
                        <h2 class="text-xl font-bold text-slate-800">注目のニュース</h2>
                    </div>
                    
                    <div id="news-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="loading-shimmer h-20 rounded-2xl"></div>
                        <div class="loading-shimmer h-20 rounded-2xl"></div>
                    </div>
                </div>
            </section>
        </div>

        <footer class="mt-12 text-center text-slate-400 text-sm">
            <p>&copy; 2026 DashLite Dashboard</p>
        </footer>
    </div>

    <!-- ニュース詳細モーダル -->
    <div id="news-modal" onclick="closeModal(event)">
        <div class="glass-card w-full max-w-2xl rounded-3xl overflow-hidden shadow-2xl" onclick="event.stopPropagation()">
            <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <span class="text-xs font-bold text-blue-500 uppercase tracking-widest">AI解説付ニュース詳細</span>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 p-2">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="p-6 md:p-8">
                <div id="modal-image-container" class="mb-6 hidden"></div>
                
                <p id="modal-date" class="text-sm text-slate-400 mb-2"></p>
                <h2 id="modal-title" class="text-2xl font-bold text-slate-800 mb-6 leading-tight"></h2>
                
                <div class="bg-blue-50 border-l-4 border-blue-400 p-4 mb-6 rounded-r-xl">
                    <h4 class="text-xs font-bold text-blue-600 uppercase mb-2 flex items-center">
                        <i class="fas fa-robot mr-2"></i> AIによる内容解説
                    </h4>
                    <div id="ai-content" class="text-slate-700 text-sm leading-relaxed custom-scrollbar max-h-[250px] overflow-y-auto pr-2">
                        <p class="italic text-slate-400"><i class="fas fa-spinner fa-spin mr-2"></i>AIが内容を分かりやすく解説中...</p>
                    </div>
                </div>

                <div id="modal-content" class="text-slate-500 text-xs italic mb-8"></div>
                
                <div class="flex justify-between items-center">
                    <span class="text-[10px] text-slate-300">※AI生成の情報です。正確性は元記事を確認してください。</span>
                    <a id="modal-link" href="#" target="_blank" class="px-6 py-3 bg-blue-500 text-white rounded-full font-bold hover:bg-blue-600 transition-all shadow-md inline-flex items-center text-sm">
                        元記事を読む <i class="fas fa-external-link-alt ml-2 text-xs"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 設定 ---
        const apiKey = ""; // 実行環境から提供されます
        const ANNOUNCEMENT_API_URL = 'https://script.google.com/macros/s/AKfycbxigVan3WWQXD5gsbgEBXWOZchmWjRODRxU5iZfqQUQEbCify-vxSXIN1OEPFS3H69DpA/exec'; 

        const CITIES = [
            { name: "札幌", code: "016000", stId: "14163" },
            { name: "東京", code: "130000", stId: "44132" },
            { name: "名古屋", code: "230000", stId: "51106" },
            { name: "大阪", code: "270000", stId: "62078" },
            { name: "福岡", code: "400000", stId: "82182" }
        ];

        let currentNews = [];

        // --- 時計 ---
        function updateDateTime() {
            const now = new Date();
            const options = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('current-date').textContent = now.toLocaleDateString('ja-JP', options);
        }

        // --- AI解説取得 (リトライ機能強化) ---
        async function fetchAIExplanation(title, fallbackContent) {
            const container = document.getElementById('ai-content');
            container.innerHTML = `<p class="italic text-slate-400"><i class="fas fa-spinner fa-spin mr-2"></i>AIが内容を分かりやすく解説中...</p>`;
            
            const systemPrompt = "あなたは18歳未満の若者にも分かりやすくニュースを解説するアシスタントです。提供されたニュースの見出しをもとに、そのニュースの背景、なぜ重要なのか、どのような影響があるのかを、300文字程度の読みやすい日本語で解説してください。健康的で安全なトピックに限定し、難しい言葉には説明を加えてください。";
            const userQuery = `以下のニュースについて詳しく解説してください：\n\n「${title}」`;

            let retryCount = 0;
            const maxRetries = 5;

            async function makeRequest() {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userQuery }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });

                    if (!response.ok) throw new Error(`API Error: ${response.status}`);

                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (text) {
                        container.innerHTML = `<div class="whitespace-pre-wrap">${text}</div>`;
                    } else {
                        throw new Error('Empty response');
                    }
                } catch (error) {
                    if (retryCount < maxRetries) {
                        retryCount++;
                        const delay = Math.pow(2, retryCount) * 1000; // 指数バックオフ
                        setTimeout(makeRequest, delay);
                    } else {
                        // 全てのリトライが失敗した時のフォールバック表示
                        container.innerHTML = `
                            <p class="text-slate-500 mb-2 font-bold">一時的にAI解説が利用できません。</p>
                            <p class="text-slate-600">${fallbackContent || '元記事のタイトルから内容を推測してください。詳細は「元記事を読む」ボタンから確認できます。'}</p>
                        `;
                    }
                }
            }
            
            makeRequest();
        }

        // --- 告知取得 ---
        async function fetchAnnouncement() {
            const container = document.getElementById('announcement-content');
            try {
                const response = await fetch(ANNOUNCEMENT_API_URL);
                const data = await response.json();
                if (data && data.content) {
                    container.innerHTML = `<p class="text-slate-800 font-bold text-lg leading-relaxed">${data.content}</p>`;
                } else {
                    container.innerHTML = `<p class="text-slate-500 italic text-sm">新しい告知はありません</p>`;
                }
            } catch (error) {
                container.innerHTML = `<p class="text-slate-400 text-xs italic">告知を読み込めませんでした</p>`;
            }
        }

        // --- 天気アイコン ---
        function getWeatherIcon(code) {
            code = parseInt(code);
            if (code >= 100 && code < 200) return "fa-sun text-orange-400";
            if (code >= 200 && code < 300) return "fa-cloud text-slate-400";
            if (code >= 300 && code < 400) return "fa-cloud-showers-heavy text-blue-400";
            if (code >= 400) return "fa-snowflake text-cyan-300";
            return "fa-cloud-sun text-slate-400";
        }

        // --- 天気データ取得 ---
        async function fetchAllWeather() {
            const grid = document.getElementById('weather-grid');
            const safeFetch = async (url) => {
                try {
                    const res = await fetch(url);
                    return res.ok ? await res.json() : null;
                } catch (e) { return null; }
            };

            const amedasData = await safeFetch("https://www.jma.go.jp/bosai/amedas/data/latest_timeseries.json");
            const weatherCards = [];

            for (const city of CITIES) {
                const forecastData = await safeFetch(`https://www.jma.go.jp/bosai/forecast/data/forecast/${city.code}.json`);
                if (!forecastData) {
                    weatherCards.push({ name: city.name, icon: "fa-question-circle text-slate-300", text: "取得エラー", current: "--", max: "--", min: "--" });
                    continue;
                }

                try {
                    const weatherInfo = forecastData[0].timeSeries[0].areas[0];
                    const weatherCode = weatherInfo.weatherCodes[0];
                    const weatherText = weatherInfo.weathers[0].split('　')[0];

                    let maxT = "--", minT = "--";
                    const tempSeries = forecastData[0].timeSeries.find(s => s.areas[0].temps);
                    if (tempSeries) {
                        const temps = tempSeries.areas[0].temps.map(t => parseFloat(t)).filter(t => !isNaN(t));
                        if (temps.length >= 1) maxT = Math.max(...temps);
                        if (temps.length >= 2) minT = Math.min(...temps);
                    }

                    let curT = "--";
                    if (amedasData && amedasData[city.stId]) {
                        const st = amedasData[city.stId];
                        if (st.temp) {
                            const validTemps = st.temp.filter(v => v !== null);
                            if (validTemps.length > 0) curT = validTemps[validTemps.length - 1];
                        }
                    }
                    if (curT === "--" && maxT !== "--") curT = maxT;

                    weatherCards.push({
                        name: city.name,
                        icon: getWeatherIcon(weatherCode),
                        text: weatherText,
                        current: curT,
                        max: maxT,
                        min: minT
                    });
                } catch (e) {
                    weatherCards.push({ name: city.name, icon: "fa-question-circle", text: "解析不可", current: "--", max: "--", min: "--" });
                }
            }

            grid.innerHTML = weatherCards.map(data => `
                <div class="weather-grid-item bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex flex-col items-center">
                    <span class="text-sm font-bold text-slate-600 mb-1">${data.name}</span>
                    <i class="fas ${data.icon} text-3xl my-2"></i>
                    <span class="text-[10px] font-medium text-slate-400 mb-2 truncate w-full px-1">${data.text}</span>
                    <div class="flex flex-col items-center w-full mt-1 border-t border-slate-50 pt-2">
                        <div class="text-2xl font-black text-slate-800 tracking-tighter mb-1">
                            ${data.current}<span class="text-sm font-normal ml-0.5">°C</span>
                        </div>
                        <div class="flex gap-2 text-[10px] font-bold">
                            <span class="px-1.5 py-0.5 rounded bg-red-50 text-red-500">↑ ${data.max}°</span>
                            <span class="px-1.5 py-0.5 rounded bg-blue-50 text-blue-500">↓ ${data.min}°</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // --- ニュース取得 ---
        async function fetchNews() {
            const newsList = document.getElementById('news-list');
            try {
                const rssUrl = encodeURIComponent('https://news.google.com/rss?hl=ja&gl=JP&ceid=JP:ja');
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
                const data = await response.json();
                if (data.status === 'ok') {
                    currentNews = data.items;
                    newsList.innerHTML = data.items.slice(0, 10).map((item, index) => {
                        const date = new Date(item.pubDate);
                        const timeStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${date.getMinutes().toString().padStart(2, '0')}`;
                        
                        const thumb = item.thumbnail || (item.enclosure ? item.enclosure.link : '');
                        const imageTag = thumb ? `<img src="${thumb}" class="absolute left-4 top-4 w-12 h-12 object-cover rounded-lg shadow-sm">` : '';

                        return `
                            <div onclick="openModal(${index})" class="cursor-pointer p-4 rounded-2xl bg-slate-50 hover:bg-white hover:shadow-md transition-all border border-transparent hover:border-blue-100 group flex items-start gap-4">
                                ${imageTag}
                                <div class="flex-1 ${thumb ? 'pl-16' : ''}">
                                    <span class="text-[10px] font-bold text-blue-500 uppercase tracking-widest block mb-1">${timeStr}</span>
                                    <h3 class="text-sm font-bold text-slate-700 leading-snug group-hover:text-blue-600 line-clamp-2">
                                        ${item.title}
                                    </h3>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            } catch (error) {
                newsList.innerHTML = `<p class="text-red-400 text-xs py-4 text-center w-full col-span-2">ニュースを読み込めませんでした</p>`;
            }
        }

        function openModal(index) {
            const item = currentNews[index];
            const modal = document.getElementById('news-modal');
            const imgContainer = document.getElementById('modal-image-container');
            
            const imgUrl = item.thumbnail || (item.enclosure ? item.enclosure.link : '');
            if (imgUrl) {
                imgContainer.innerHTML = `<img src="${imgUrl}" alt="News Image" onerror="this.parentNode.classList.add('hidden')">`;
                imgContainer.classList.remove('hidden');
            } else {
                imgContainer.classList.add('hidden');
            }

            document.getElementById('modal-title').textContent = item.title;
            document.getElementById('modal-date').textContent = new Date(item.pubDate).toLocaleString('ja-JP');
            document.getElementById('modal-content').innerHTML = `元記事の要約：${item.content || '概要なし'}`;
            document.getElementById('modal-link').href = item.link;
            
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';

            // AI解説をリクエスト (フォールバック用の概要を渡す)
            fetchAIExplanation(item.title, item.content || item.description);
        }

        function closeModal() {
            document.getElementById('news-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function refreshAll() {
            const status = document.getElementById('update-status');
            status.innerHTML = '<i class="fas fa-sync-alt fa-spin text-blue-500 mr-1"></i>更新中...';
            
            Promise.allSettled([fetchAnnouncement(), fetchAllWeather(), fetchNews()]).then(() => {
                setTimeout(() => {
                    status.innerHTML = '<i class="fas fa-check text-green-500 mr-1"></i>最新の状態';
                }, 800);
            });
        }

        window.onload = () => {
            updateDateTime();
            refreshAll();
            setInterval(updateDateTime, 30000);
            setInterval(refreshAll, 600000); 
        };
    </script>
</body>
</html>
